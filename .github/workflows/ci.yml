name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One run per ref: a new push (or a deploy's rebase force-push) supersedes the
# in-progress run for the same branch/PR and cancels it, instead of piling up.
# During a burst of merges this stops the parallel runs from starving the runner
# pool — the symptom was jobs stuck "pending" for minutes and superseded runs
# surfacing as red "operation was canceled" failures.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      # golangci-lint's default set includes govet and the full staticcheck
      # suite — one owner per analysis.
      - run: go tool golangci-lint run ./...
      - run: go tool gocyclo -over 15 .

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: sudo apt-get install -y fuse3
      - run: go tool gotestsum -- -coverprofile=coverage.out $(go list ./... | grep -v /cmd/)
      - name: Check coverage threshold
        run: >-
          go tool cover -func=coverage.out |
          awk '/^total:/{gsub(/%/,"",$NF); printf "Total coverage: %s%%\n", $NF;
          if ($NF+0 < 80.0) {print "::error::Coverage below 80% threshold"; exit 1}
          else {print "OK: meets 80% threshold"}}'
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: go tool gosec ./...
      - run: go tool govulncheck ./...
      - run: go tool gitleaks git -v

  build:
    runs-on: ubuntu-24.04
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: go build -o bin/human .
