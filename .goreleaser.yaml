version: 2

builds:
  - main: .
    binary: human
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: gethuman-sh
      name: homebrew-tap
    homepage: https://github.com/StephanSchmidt/human
    description: Issue tracker CLI for AIs
    license: MIT
    install: |
      bin.install "human"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
